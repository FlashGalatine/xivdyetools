# BUG-008 (2026-07-18 audit): the default (top-level) env is a separate dev
# worker with its own name and NO routes, so a plain `wrangler deploy` can
# never overwrite the production worker on data.xivdyetools.app with dev vars
# or the dev KV namespace. Production config lives exclusively under
# [env.production] and is deployed via `wrangler deploy --env production`.
name = "xivdyetools-api-worker-dev"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# ARCH-001: nodejs_compat removed — no Node.js APIs used

[dev]
port = 8790
local_protocol = "http"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "8f2028935b544902bf468a9055d765ef"

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"

[env.production]
name = "xivdyetools-api-worker"
routes = [
  { pattern = "data.xivdyetools.app", custom_domain = true }
]
vars = { ENVIRONMENT = "production", API_VERSION = "v1" }

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "a57d958973884b578889e827311f9ee2"
