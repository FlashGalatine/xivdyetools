version: 2

updates:
  # npm dependencies (pnpm monorepo — root handles all workspaces)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: 15
    groups:
      # Group minor/patch updates together to reduce PR noise
      production-deps:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-deps:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 15
    reviewers:
      - FlashGalatine

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: 15
    open-pull-requests-limit: 5
    reviewers:
      - FlashGalatine
    ignore:
      # pnpm/action-setup v6 bootstraps pnpm v11 release candidates, which
      # cannot parse v10-format lockfiles. Re-enable once pnpm v11 stable
      # ships and this repo's packageManager field is bumped accordingly.
      - dependency-name: pnpm/action-setup
        update-types:
          - version-update:semver-major
