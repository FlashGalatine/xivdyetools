name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ARCH-003: Scan production dependencies for known vulnerabilities
      - name: Security audit (production dependencies)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

      - name: Lint (affected)
        run: pnpm turbo run lint --filter='...[HEAD^]'

      - name: Type-check (affected)
        run: pnpm turbo run type-check --filter='...[HEAD^]'

      - name: Test (affected)
        run: pnpm turbo run test --filter='...[HEAD^]' --continue

      - name: Build (affected)
        run: pnpm turbo run build --filter='...[HEAD^]'

      # ARCH-004: Report bundle sizes for built packages
      - name: Report bundle sizes
        if: always()
        run: |
          echo "## 📦 Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| Package | JS Output | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          for dir in apps/*/dist packages/*/dist; do
            if [ -d "$dir" ]; then
              name=$(echo "$dir" | sed 's|/dist||')
              js_bytes=$(find "$dir" \( -name '*.js' -o -name '*.mjs' \) -exec cat {} + 2>/dev/null | wc -c)
              if [ "$js_bytes" -gt 0 ]; then
                js_human=$(numfmt --to=iec "$js_bytes")
                if [ "$js_bytes" -gt 5242880 ]; then
                  echo "| $name | $js_human | ⚠️ >5 MiB |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $name | $js_human | ✅ |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            fi
          done
