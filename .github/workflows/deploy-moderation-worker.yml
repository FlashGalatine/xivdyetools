name: Deploy Moderation Worker

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/moderation-worker/**'
      - 'packages/types/**'
      - 'packages/logger/**'
      - 'packages/auth/**'
      - 'packages/rate-limiter/**'
      # ARCH-001: Add transitive dependency (auth → crypto)
      - 'packages/crypto/**'
  workflow_dispatch:

concurrency:
  group: deploy-moderation-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Moderation Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo run build --filter=xivdyetools-moderation-worker...

      - name: Type-check
        run: pnpm turbo run type-check --filter=xivdyetools-moderation-worker

      - name: Test
        run: pnpm turbo run test --filter=xivdyetools-moderation-worker

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/moderation-worker
          command: deploy --env production
          packageManager: pnpm

      # ARCH-002: Verify deployed worker responds after deployment
      - name: Smoke test (health check)
        run: |
          sleep 5
          curl --fail --retry 3 --retry-delay 5 --retry-all-errors \
            -H "User-Agent: xivdyetools-ci" \
            https://moderation-bot.xivdyetools.app/health
