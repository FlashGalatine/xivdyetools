name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/api-docs/**'
      - '.github/workflows/deploy-api-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=xivdyetools-api-docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api-docs
          command: pages deploy .vitepress/dist --project-name=xivdyetools-api-docs
          packageManager: pnpm
          wranglerVersion: 4.78.0

      # ARCH-002: Verify deployed Pages site responds after deployment
      - name: Smoke test (page load)
        run: |
          sleep 10
          curl --fail --retry 3 --retry-delay 10 --retry-all-errors \
            -H "User-Agent: xivdyetools-ci" \
            https://xivdyetools-api-docs.pages.dev/
